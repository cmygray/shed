<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shed.cmygray.net</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #222;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    header { margin-bottom: 40px; }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    header p {
      color: #666;
      font-size: 15px;
    }

    header a { color: inherit; }

    h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin: 36px 0 12px;
    }

    ul { list-style: none; }

    li { border-top: 1px solid #eee; }
    li:last-child { border-bottom: 1px solid #eee; }

    li a {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 12px 0;
      text-decoration: none;
      color: inherit;
    }
    li a:hover .tool-name { text-decoration: underline; }

    .tool-name {
      font-weight: 500;
      white-space: nowrap;
    }

    .tool-desc {
      color: #666;
      font-size: 15px;
    }

    footer {
      margin-top: 60px;
      font-size: 13px;
      color: #aaa;
    }
    footer a { color: inherit; }
  </style>
</head>
<body>

<header>
  <h1>shed</h1>
  <p>Experimental tools by <a href="https://cmygray.net">Won</a></p>
</header>

<main>
  <h2>Tools</h2>
  <ul>
    <li>
      <a href="/shed/pdf-viewer.html">
        <span class="tool-name">PDF Viewer</span>
        <span class="tool-desc">Tablet-optimised PDF viewer. Works with local files and URLs.</span>
      </a>
    </li>
  </ul>
</main>

<footer>
  <a href="https://github.com/cmygray/shed">GitHub</a>
</footer>

</body>
</html>
