<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PDF Viewer — shed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #2a2a2a;
      border-bottom: 1px solid #3a3a3a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #back {
      font-size: 13px;
      color: #888;
      text-decoration: none;
      padding: 4px 2px;
      white-space: nowrap;
    }
    #back:hover { color: #ccc; }

    #divider {
      width: 1px;
      height: 18px;
      background: #444;
      flex-shrink: 0;
    }

    #toolbar button {
      padding: 6px 14px;
      background: #3a3a3a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    #toolbar button:active { background: #555; }

    #url-input {
      flex: 1;
      min-width: 180px;
      padding: 6px 10px;
      background: #333;
      color: #eee;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 14px;
    }
    #url-input::placeholder { color: #666; }

    #page-info {
      font-size: 14px;
      color: #888;
      white-space: nowrap;
      min-width: 80px;
      text-align: center;
    }

    #scroll-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .page-slot {
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .page-slot canvas {
      display: block;
    }

    #placeholder {
      color: #555;
      font-size: 16px;
      text-align: center;
      line-height: 2;
      pointer-events: none;
      padding-top: 30vh;
    }

    #status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      display: none;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    #file-input { display: none; }
  </style>
</head>
<body>

<div id="toolbar">
  <a id="back" href="/shed">&larr; shed</a>
  <span id="divider"></span>
  <button id="open-btn">파일 열기</button>
  <input type="text" id="url-input" placeholder="PDF URL 입력 후 Enter 또는 불러오기">
  <button id="load-url-btn">불러오기</button>
  <span id="page-info">&mdash;</span>
</div>

<div id="scroll-container">
  <div id="pages">
    <div id="placeholder">
      파일을 열거나 URL을 입력하세요<br>
      <small>스크롤하여 페이지 이동</small>
    </div>
  </div>
</div>

<div id="status"></div>
<input type="file" id="file-input" accept=".pdf,application/pdf">

<script type="module">
console.log('[pdf-viewer] module start');
import * as pdfjsLib from 'https://unpkg.com/pdfjs-dist@5.4.624/build/pdf.min.mjs';
console.log('[pdf-viewer] pdfjs loaded', !!pdfjsLib);
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://unpkg.com/pdfjs-dist@5.4.624/build/pdf.worker.min.mjs';

const IS_IOS = /iPad|iPhone/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const MAX_CANVAS_PX = IS_IOS ? 3_000_000 : 5_000_000;
const MAX_DPR = 2;

function resolveSource(input) {
  if (input instanceof File) {
    const url = URL.createObjectURL(input);
    return { url, dispose: () => URL.revokeObjectURL(url) };
  }
  return { url: input, dispose: () => {} };
}

function calcRenderInfo(page, containerWidth) {
  const vp1 = page.getViewport({ scale: 1 });
  const fitScale = containerWidth / vp1.width;

  let renderScale = fitScale * Math.min(window.devicePixelRatio ?? 1, MAX_DPR);
  const testVp = page.getViewport({ scale: renderScale });
  if (testVp.width * testVp.height > MAX_CANVAS_PX) {
    renderScale *= Math.sqrt(MAX_CANVAS_PX / (testVp.width * testVp.height));
  }

  const renderVp = page.getViewport({ scale: renderScale });
  return {
    canvasWidth:  Math.floor(renderVp.width),
    canvasHeight: Math.floor(renderVp.height),
    cssWidth:     vp1.width  * fitScale,
    cssHeight:    vp1.height * fitScale,
    renderVp,
  };
}

// ── 뷰어 ─────────────────────────────────────────────────────────────────────

const scrollContainer = document.getElementById('scroll-container');
const pagesEl = document.getElementById('pages');
const pageInfoEl = document.getElementById('page-info');

class PDFViewer {
  #pdf = null;
  #source = null;
  #slots = [];
  #rendered = new Set();
  #observer = null;

  async load(input) {
    this.destroy();
    this.#source = resolveSource(input);

    showStatus('로딩 중…');
    try {
      this.#pdf = await pdfjsLib.getDocument({ url: this.#source.url }).promise;
    } catch (e) {
      showStatus(`불러오기 실패: ${e.message}`);
      throw e;
    }
    showStatus('');

    const ph = document.getElementById('placeholder');
    if (ph) ph.style.display = 'none';
    await this.#createSlots();
    this.#setupObservers();
  }

  get total() { return this.#pdf?.numPages ?? 0; }

  async #createSlots() {
    // Clear pages container safely
    while (pagesEl.firstChild) pagesEl.removeChild(pagesEl.firstChild);
    this.#slots = [];
    const containerWidth = scrollContainer.clientWidth - 24;

    for (let i = 1; i <= this.total; i++) {
      const page = await this.#pdf.getPage(i);
      const vp1 = page.getViewport({ scale: 1 });
      const fitScale = containerWidth / vp1.width;
      const cssW = vp1.width * fitScale;
      const cssH = vp1.height * fitScale;
      page.cleanup();

      const slot = document.createElement('div');
      slot.className = 'page-slot';
      slot.dataset.page = String(i);
      slot.style.width = `${cssW}px`;
      slot.style.height = `${cssH}px`;
      pagesEl.appendChild(slot);
      this.#slots.push(slot);
    }

    pageInfoEl.textContent = `1 / ${this.total}`;
  }

  #setupObservers() {
    // Render pages when near viewport
    this.#observer = new IntersectionObserver(
      entries => {
        for (const entry of entries) {
          const pageNum = parseInt(entry.target.dataset.page);
          if (entry.isIntersecting) {
            this.#renderPage(pageNum);
          } else {
            this.#clearPage(pageNum);
          }
        }
      },
      { root: scrollContainer, rootMargin: '200% 0px' }
    );

    for (const slot of this.#slots) {
      this.#observer.observe(slot);
    }

    scrollContainer.addEventListener('scroll', this.#onScroll, { passive: true });
  }

  #onScroll = () => {
    const containerRect = scrollContainer.getBoundingClientRect();
    const centerY = containerRect.top + containerRect.height / 2;
    let currentPage = 1;
    for (const slot of this.#slots) {
      const rect = slot.getBoundingClientRect();
      if (rect.top <= centerY && rect.bottom > centerY) {
        currentPage = parseInt(slot.dataset.page);
        break;
      }
      if (rect.top <= centerY) {
        currentPage = parseInt(slot.dataset.page);
      }
    }
    pageInfoEl.textContent = `${currentPage} / ${this.total}`;
  };

  async #renderPage(n) {
    if (this.#rendered.has(n) || !this.#pdf) return;
    this.#rendered.add(n);

    const slot = this.#slots[n - 1];
    const page = await this.#pdf.getPage(n);
    const containerWidth = scrollContainer.clientWidth - 24;
    const info = calcRenderInfo(page, containerWidth);

    const canvas = document.createElement('canvas');
    canvas.width = info.canvasWidth;
    canvas.height = info.canvasHeight;
    canvas.style.width = `${info.cssWidth}px`;
    canvas.style.height = `${info.cssHeight}px`;

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport: info.renderVp,
    }).promise;
    page.cleanup();

    if (this.#rendered.has(n)) {
      slot.replaceChildren(canvas);
    } else {
      canvas.width = 0;
      canvas.height = 0;
    }
  }

  #clearPage(n) {
    if (!this.#rendered.has(n)) return;
    this.#rendered.delete(n);
    const slot = this.#slots[n - 1];
    const canvas = slot.querySelector('canvas');
    if (canvas) {
      canvas.width = 0;
      canvas.height = 0;
    }
    slot.replaceChildren();
  }

  destroy() {
    scrollContainer.removeEventListener('scroll', this.#onScroll);
    this.#observer?.disconnect();
    for (const n of this.#rendered) {
      const slot = this.#slots[n - 1];
      const canvas = slot?.querySelector('canvas');
      if (canvas) { canvas.width = 0; canvas.height = 0; }
    }
    this.#rendered.clear();
    this.#slots = [];
    this.#source?.dispose();
    this.#pdf?.destroy();
    this.#pdf = null;
    while (pagesEl.firstChild) pagesEl.removeChild(pagesEl.firstChild);
    pageInfoEl.textContent = '—';
  }
}

// ── UI 헬퍼 ──────────────────────────────────────────────────────────────────

function showStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── 이벤트 연결 ──────────────────────────────────────────────────────────────

const viewer = new PDFViewer();

document.getElementById('open-btn').onclick = () =>
  document.getElementById('file-input').click();

document.getElementById('file-input').onchange = e => {
  const file = e.target.files[0];
  if (file) viewer.load(file).catch(e => console.error('[pdf-viewer] load error', e));
  e.target.value = '';
};

function loadFromUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (url) viewer.load(url).catch(e => console.error('[pdf-viewer] load error', e));
}
document.getElementById('load-url-btn').onclick = loadFromUrl;
document.getElementById('url-input').onkeydown = e => {
  if (e.key === 'Enter') loadFromUrl();
};
</script>

</body>
</html>
